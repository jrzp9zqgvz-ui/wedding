<!DOCTYPE html>
<html>
<head>
  <title>婚礼计划系统 - API 测试</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      background: #f5f5f5;
    }
    .test-section {
      background: white;
      padding: 1.5rem;
      margin: 1rem 0;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    button {
      padding: 0.5rem 1rem;
      background: #d6aa60;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin: 0.5rem 0.25rem 0.5rem 0;
    }
    button:hover {
      background: #c49851;
    }
    pre {
      background: #f0f0f0;
      padding: 1rem;
      border-radius: 4px;
      overflow: auto;
      max-height: 300px;
    }
    .status {
      padding: 1rem;
      border-radius: 4px;
      margin: 1rem 0;
    }
    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
  </style>
</head>
<body>
  <h1>🎉 婚礼计划系统 - API 测试</h1>
  
  <div class="test-section">
    <h2>1️⃣ 检查后端连接</h2>
    <button onclick="testHealth()">健康检查</button>
    <div id="health-result"></div>
  </div>

  <div class="test-section">
    <h2>2️⃣ 获取所有计划</h2>
    <button onclick="testGetPlans()">获取计划</button>
    <div id="plans-result"></div>
  </div>

  <div class="test-section">
    <h2>3️⃣ 添加新计划</h2>
    <button onclick="testAddPlan()">添加测试计划</button>
    <div id="add-result"></div>
  </div>

  <div class="test-section">
    <h2>4️⃣ 打开完整应用</h2>
    <button onclick="openApp()">✨ 打开应用</button>
  </div>

  <script>
    const API_BASE = 'http://localhost:3000';

    async function testHealth() {
      try {
        const response = await fetch(`${API_BASE}/health`);
        const data = await response.json();
        document.getElementById('health-result').innerHTML = 
          `<div class="status success">✓ 后端连接成功！<pre>${JSON.stringify(data, null, 2)}</pre></div>`;
      } catch (error) {
        document.getElementById('health-result').innerHTML = 
          `<div class="status error">✗ 连接失败: ${error.message}</div>`;
      }
    }

    async function testGetPlans() {
      try {
        const response = await fetch(`${API_BASE}/plans`);
        const data = await response.json();
        document.getElementById('plans-result').innerHTML = 
          `<div class="status success">✓ 成功获取 ${data.length} 个计划<pre>${JSON.stringify(data, null, 2)}</pre></div>`;
      } catch (error) {
        document.getElementById('plans-result').innerHTML = 
          `<div class="status error">✗ 获取失败: ${error.message}</div>`;
      }
    }

    async function testAddPlan() {
      try {
        const response = await fetch(`${API_BASE}/plans`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            title: '测试计划 - ' + new Date().toLocaleTimeString(),
            description: '这是一个自动化测试计划',
            category: '其他',
            start_date: new Date().toISOString().split('T')[0],
            end_date: new Date(Date.now() + 86400000).toISOString().split('T')[0]
          })
        });
        const data = await response.json();
        document.getElementById('add-result').innerHTML = 
          `<div class="status success">✓ 计划添加成功！<pre>${JSON.stringify(data, null, 2)}</pre></div>`;
      } catch (error) {
        document.getElementById('add-result').innerHTML = 
          `<div class="status error">✗ 添加失败: ${error.message}</div>`;
      }
    }

    function openApp() {
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
